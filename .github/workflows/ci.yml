name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # -------------------------
  # Build + Test
  # -------------------------
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup_dotnet

      - name: Restore
        run: dotnet restore

      - name: Format check
        run: dotnet format --verify-no-changes

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build --verbosity normal -c Release

      - name: Sample verification
        run: dotnet run --project ResultType.Sample/ResultType.Sample.csproj --no-build -c Release

      - name: Pack validation
        run: dotnet pack ResultType/ResultType.csproj --no-build -c Release -o ./nupkg

  # -------------------------
  # Deploy to NuGet
  # -------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup_dotnet

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Restore
        run: dotnet restore

      - name: Pack
        run: >-
          dotnet pack
          ResultType/ResultType.csproj
          --no-restore
          -c Release
          -o ./nupkg
          /p:Version=${{ env.VERSION }}

      - name: Push to NuGet
        run: >-
          dotnet nuget push ./nupkg/*.nupkg
          --skip-duplicate
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
